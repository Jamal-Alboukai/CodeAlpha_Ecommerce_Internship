<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - CodeAlpha Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>CodeAlpha Shop</h1>
        <nav id="navbar">
            <a href="index.html">Home</a>
            <a href="login.html" id="nav-login">Login</a>
            <a href="cart.html" id="nav-cart">Cart</a>
        </nav>
    </header>

    <main>
        <h2>Your Shopping Cart</h2>
        
        <div id="cart-items" style="margin-bottom: 20px;"></div>
        
        <div style="text-align: right; font-size: 1.5rem;">
            <strong>Total: $<span id="cart-total">0.00</span></strong>
        </div>

        <div style="text-align: right; margin-top: 15px;">
            <button id="checkout-btn" style="width: auto; background: #e67e22;">Proceed to Checkout</button>
            <button id="clear-cart-btn" style="width: auto; background: #e74c3c;">Clear Cart</button>
        </div>
    </main>

    <script src="cart.js"></script> 
</body>
</html>
